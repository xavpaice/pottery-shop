apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: clay
spec:
  chart:
    name: clay
    chartVersion: 0.1.0

  values:
    secrets:
      ADMIN_PASS: 'repl{{ ConfigOption "ADMIN_PASS" }}'
      SESSION_SECRET: 'repl{{ ConfigOption "SESSION_SECRET" }}'
      SMTP_USER: 'repl{{ ConfigOption "SMTP_USER" }}'
      SMTP_PASS: 'repl{{ ConfigOption "SMTP_PASS" }}'
    config:
      ORDER_EMAIL: 'repl{{ ConfigOption "ORDER_EMAIL" }}'
      BASE_URL: 'repl{{ ConfigOption "BASE_URL" }}'
      ADMIN_USER: 'repl{{ ConfigOption "ADMIN_USER" }}'
      SMTP_HOST: 'repl{{ ConfigOption "SMTP_HOST" }}'
      SMTP_PORT: 'repl{{ ConfigOption "SMTP_PORT" }}'
      SMTP_FROM: 'repl{{ ConfigOption "SMTP_FROM" }}'
    postgres:
      managed: 'repl{{ ConfigOptionEquals "postgres_type" "managed" }}'
      cluster:
        instances: 'repl{{ ConfigOption "postgres_instances" }}'
      external:
        dsn: 'repl{{ ConfigOption "postgres_dsn" }}'
    ingress:
      enabled: 'repl{{ ConfigOptionEquals "ingress_enabled" "1" }}'
      host: 'repl{{ ConfigOption "ingress_host" }}'
      tls:
        mode: 'repl{{ ConfigOption "tls_mode" }}'
        acme:
          email: 'repl{{ ConfigOption "tls_acme_email" }}'
        secretName: 'repl{{ ConfigOption "tls_secret_name" }}'
    features:
      firingLogs:
        enabled: 'repl{{ LicenseFieldValue "firing_logs_enabled" | ParseBool }}'

  # builder values are static and used only by the Replicated airgap builder.
  # They ensure helm template renders every conditional image path so the
  # builder can scan and bundle all images that could possibly be used.
  builder:
    postgres:
      managed: true
    cloudnative-pg:
      enabled: true
    cert-manager:
      enabled: true
    features:
      firingLogs:
        enabled: true
    secrets:
      ADMIN_PASS: dummy
      SESSION_SECRET: dummy
    config:
      ORDER_EMAIL: builder@example.com
