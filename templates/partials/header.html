{{define "header"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .PageTitle}}{{.PageTitle}} — {{end}}Clay.nz</title>
    <link rel="icon" href="/static/favicon.ico" sizes="48x48">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/static/favicon-16.png" sizes="16x16" type="image/png">
    <link rel="icon" href="/static/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="/static/favicon-48.png" sizes="48x48" type="image/png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="logo">
                <img src="/static/logo-horizontal-light.svg" alt="Clay.nz" class="logo-img">
            </a>
            <nav class="main-nav">
                <a href="/">Shop</a>
                <a href="/gallery">Gallery</a>
                <a href="/cart" class="cart-link">
                    Cart
                    {{if .CartCount}}<span class="cart-badge">{{.CartCount}}</span>{{end}}
                </a>
            </nav>
        </div>
    </header>
    {{if .Flash}}
    <div class="flash-message">
        <div class="container">{{.Flash}}</div>
    </div>
    {{end}}
    <main class="container">
{{end}}
