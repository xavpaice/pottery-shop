{{define "register.html"}}
{{template "header" .}}

<div class="auth-form">
    <h2>Seller Registration</h2>

    {{if .Error}}
    <div class="flash-message error-message">
        <div class="container">{{.Error}}</div>
    </div>
    {{end}}

    <p>Register to sell your pottery on Clay.nz. Your account will be reviewed and approved by the admin before you can list items.</p>

    <form method="POST" action="/register">
        <div class="form-group">
            <label for="name">Display Name</label>
            <input type="text" id="name" name="name" required autofocus placeholder="Your name or studio name">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
        </div>
        <button type="submit" class="btn btn-primary">Request Account</button>
    </form>

    <p class="auth-link">Already have an account? <a href="/login">Log in</a></p>
</div>

{{template "footer" .}}
{{end}}
