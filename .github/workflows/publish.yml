name: Build and Publish Image

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_SLUG: xav-pottery-shop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release-to-beta:
    if: github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set release version
        id: version
        run: |
          git_hash=$(git rev-parse --short HEAD)
          date_version=$(date -u '+%Y.%-m.%-d-%H%M%S')
          version="${date_version}-Beta-${git_hash}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Update chart dependencies
        run: helm dependency update chart/clay/

      - name: Package Helm chart
        run: |
          helm package chart/clay/ --debug -u -d replicated \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }}

      - name: Update HelmChart CR version
        run: |
          sed -i "s/chartVersion: .*/chartVersion: ${{ steps.version.outputs.version }}/" replicated/clay-chart.yaml

      - name: Create release and promote to Beta
        uses: replicatedhq/compatibility-actions/create-release@v1
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: ./replicated
          promote-channel: Beta
          version: ${{ steps.version.outputs.version }}
