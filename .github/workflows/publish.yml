name: Build and Publish Image

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_SLUG: xav-pottery-shop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      version: ${{ steps.release-info.outputs.version }}
      channel: ${{ steps.release-info.outputs.channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Determine channel and version
        id: release-info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            channel="Beta"
            version="${GITHUB_REF_NAME}"
          else
            channel="Main"
            git_hash=$(git rev-parse --short HEAD)
            date_version=$(date -u '+%Y.%-m.%-d-%H%M%S')
            version="${date_version}-main-${git_hash}"
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.release-info.outputs.version }}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign image with cosign
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  replicated-release:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: helm dependency update chart/clay/

      - name: Package Helm chart
        run: |
          rm -f replicated/*.tgz
          helm package chart/clay/ --debug -u -d replicated \
            --version ${{ needs.build-and-push.outputs.version }} \
            --app-version ${{ needs.build-and-push.outputs.version }}

      - name: Update HelmChart CR version
        run: |
          sed -i "s/chartVersion: .*/chartVersion: ${{ needs.build-and-push.outputs.version }}/" replicated/clay-chart.yaml

      - name: Create release and promote to ${{ needs.build-and-push.outputs.channel }}
        uses: replicatedhq/compatibility-actions/create-release@v1
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: ./replicated
          promote-channel: ${{ needs.build-and-push.outputs.channel }}
          version: ${{ needs.build-and-push.outputs.version }}
