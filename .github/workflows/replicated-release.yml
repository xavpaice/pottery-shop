name: Replicated Release

on:
  pull_request:
    branches: [main]

env:
  APP_SLUG: xav-pottery-shop

jobs:
  release-to-unstable:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set release version
        id: version
        run: |
          git_hash=$(git rev-parse --short HEAD)
          date_version=$(date -u '+%Y.%-m.%-d-%H%M%S')
          version="${date_version}-Unstable-${git_hash}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Update chart dependencies
        run: helm dependency update chart/clay/

      - name: Package Helm chart
        run: |
          helm package chart/clay/ --debug -u -d replicated \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }}

      - name: Update HelmChart CR version
        run: |
          sed -i "s/chartVersion: .*/chartVersion: ${{ steps.version.outputs.version }}/" replicated/clay-chart.yaml

      - name: Create release and promote to Unstable
        id: create-release
        uses: replicatedhq/compatibility-actions/create-release@v1
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: ./replicated
          promote-channel: Unstable
          version: ${{ steps.version.outputs.version }}

    outputs:
      release-sequence: ${{ steps.create-release.outputs.release-sequence }}
      version: ${{ steps.version.outputs.version }}
