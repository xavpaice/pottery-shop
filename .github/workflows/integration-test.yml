name: Integration Test (CMX)

on:
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  integration-test:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Build and push image with PR-specific tag so the cluster can pull it
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}

      # Lint the chart before we try to install it
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: helm dependency update chart/clay/

      - name: Lint Helm chart
        run: helm lint chart/clay/

      # Create a CMX cluster for testing
      - name: Create CMX cluster
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: k3s
          kubernetes-version: 1.35.0
          cluster-name: pottery-ci-${{ github.run_id }}
          timeout-minutes: 10
          export-kubeconfig: true

      - name: Install chart on CMX cluster
        run: |
          # Create namespace with Helm ownership labels (chart includes namespace.yaml)
          kubectl create namespace clay --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace clay app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate namespace clay meta.helm.sh/release-name=clay meta.helm.sh/release-namespace=clay --overwrite

          # Create image pull secret for GHCR (private registry)
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace clay \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }}

          # Install the chart with test-appropriate values
          helm install clay chart/clay/ \
            --namespace clay \
            --set image.tag=pr-${{ github.event.pull_request.number }} \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set secrets.ADMIN_PASS=ci-test-only \
            --set secrets.SESSION_SECRET=ci-test-session-secret-not-for-production \
            --set ingress.enabled=false \
            --set persistence.enabled=false \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods -n clay
          kubectl rollout status deployment/clay -n clay --timeout=120s

          # Verify the pod is actually responding
          POD_NAME=$(kubectl get pods -n clay -l app.kubernetes.io/name=clay -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n clay "$POD_NAME" -- wget -qO- http://localhost:8080/ | head -c 200

      - name: Verify cert-manager templates render and apply
        run: |
          helm upgrade clay chart/clay/ \
            --namespace clay \
            --set image.tag=pr-${{ github.event.pull_request.number }} \
            --set imagePullSecrets[0].name=ghcr-pull-secret \
            --set secrets.ADMIN_PASS=ci-test-only \
            --set secrets.SESSION_SECRET=ci-test-session-secret-not-for-production \
            --set ingress.enabled=true \
            --set ingress.host=pottery.ci.local \
            --set ingress.tls.mode=selfsigned \
            --set persistence.enabled=false \
            --timeout 5m \
            --wait
          kubectl get clusterissuers -n clay || true
          kubectl get certificates -n clay || true

      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n clay -o wide || true
          echo "=== Events ==="
          kubectl get events -n clay --sort-by='.lastTimestamp' || true
          echo "=== Pod Describe ==="
          kubectl describe pods -n clay || true
          echo "=== Pod Logs ==="
          kubectl logs -n clay -l app.kubernetes.io/name=clay --tail=50 || true

      - name: Remove CMX cluster
        if: always()
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
