name: Integration Test (CMX)

on:
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_SLUG: xav-pottery-shop

jobs:
  build-and-release:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      channel-slug: ${{ steps.create-release.outputs.channel-slug }}
      release-sequence: ${{ steps.create-release.outputs.release-sequence }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        id: version
        run: |
          git_hash=$(git rev-parse --short HEAD)
          date_version=$(date -u '+%Y.%-m.%-d-%H%M%S')
          version="${date_version}-pr${{ github.event.pull_request.number }}-${git_hash}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Build and push image so the Replicated proxy can pull it
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}

      # Package chart and push to Replicated
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: helm dependency update chart/clay/

      - name: Lint Helm chart
        run: helm lint chart/clay/

      - name: Package Helm chart
        run: |
          rm -f replicated/*.tgz
          helm package chart/clay/ --debug -u -d replicated \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }}

      - name: Update HelmChart CR version
        run: |
          sed -i "s/chartVersion: .*/chartVersion: ${{ steps.version.outputs.version }}/" replicated/clay-chart.yaml

      - name: Create release and promote to Unstable
        id: create-release
        uses: replicatedhq/compatibility-actions/create-release@v1
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          yaml-dir: ./replicated
          promote-channel: Unstable
          version: ${{ steps.version.outputs.version }}

  integration-test:
    needs: build-and-release
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create CI customer
        id: create-customer
        uses: replicatedhq/compatibility-actions/create-customer@v1
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          customer-name: ci-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          channel-slug: ${{ needs.build-and-release.outputs.channel-slug }}
          customer-email: ci-pr-${{ github.event.pull_request.number }}@clay.nz
          license-type: dev
          expires-in: 1

      - name: Create CMX cluster
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: k3s
          kubernetes-version: 1.35.0
          cluster-name: pottery-ci-${{ github.run_id }}
          timeout-minutes: 10
          ttl: 30m
          export-kubeconfig: true

      - name: Install chart from Replicated
        uses: replicatedhq/compatibility-actions/helm-install@v1
        with:
          kubeconfig: ${{ steps.create-cluster.outputs.cluster-kubeconfig }}
          helm-path: helm
          registry-username: ci-pr-${{ github.event.pull_request.number }}@clay.nz
          registry-password: ${{ steps.create-customer.outputs.license-id }}
          chart: oci://registry.replicated.com/${{ env.APP_SLUG }}/${{ needs.build-and-release.outputs.channel-slug }}/clay
          name: clay
          version: ${{ needs.build-and-release.outputs.version }}
          namespace: clay
          values: |
            secrets:
              ADMIN_PASS: ci-test-only
              SESSION_SECRET: ci-test-session-secret-not-for-production
            ingress:
              enabled: true
              host: pottery.ci.local
              tls:
                mode: selfsigned
            persistence:
              enabled: false
            cert-manager:
              startupapicheck:
                enabled: false
          extra-helm-flags: '--create-namespace --timeout 5m'

      - name: Wait for Postgres cluster
        run: |
          echo "Waiting for CNPG Postgres cluster..."
          for i in $(seq 1 60); do
            PHASE=$(kubectl get clusters.postgresql.cnpg.io -n clay clay-postgres -o jsonpath='{.status.phase}' 2>/dev/null || echo "pending")
            if echo "$PHASE" | grep -q "Cluster in healthy state"; then
              echo "Postgres ready"
              break
            fi
            printf "."
            sleep 5
          done
          echo ""

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/clay -n clay --timeout=120s
          kubectl get pods -n clay

          # Verify the pod is actually responding
          POD_NAME=$(kubectl get pods -n clay -l app.kubernetes.io/name=clay -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n clay "$POD_NAME" -- wget -qO- http://localhost:8080/ | head -c 200

      - name: Verify cert-manager resources
        run: |
          # Wait for CRDs to register (post-install hook)
          for i in $(seq 1 30); do
            if kubectl get crd clusterissuers.cert-manager.io >/dev/null 2>&1; then
              echo "cert-manager CRDs ready"
              break
            fi
            printf "."
            sleep 5
          done
          echo ""
          kubectl get clusterissuers || true
          kubectl get certificates -n clay || true

      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n clay -o wide || true
          echo "=== Events ==="
          kubectl get events -n clay --sort-by='.lastTimestamp' || true
          echo "=== Pod Describe ==="
          kubectl describe pods -n clay || true
          echo "=== Pod Logs ==="
          kubectl logs -n clay -l app.kubernetes.io/name=clay --tail=50 || true

      - name: Remove CMX cluster
        if: always()
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}

      - name: Archive CI customer
        if: always()
        uses: replicatedhq/compatibility-actions/archive-customer@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          customer-id: ${{ steps.create-customer.outputs.customer-id }}
