name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify dependencies
        run: go mod verify

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: make test

      - name: Build
        run: make build

  helm-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: helm dependency update chart/clay/

      - name: Lint (bundled mode — both operators)
        run: helm lint chart/clay/ --values chart/clay/ci/ci-bundled-values.yaml

      - name: Template (bundled mode — both operators)
        run: helm template clay chart/clay/ --values chart/clay/ci/ci-bundled-values.yaml

      - name: Lint (pre-installed mode — both disabled)
        run: helm lint chart/clay/ --values chart/clay/ci/ci-preinstalled-values.yaml

      - name: Template (pre-installed mode — both disabled)
        run: helm template clay chart/clay/ --values chart/clay/ci/ci-preinstalled-values.yaml

      - name: Lint (external-db mode — minimal)
        run: helm lint chart/clay/ --values chart/clay/ci/ci-external-db-values.yaml

      - name: Template (external-db mode — minimal)
        run: helm template clay chart/clay/ --values chart/clay/ci/ci-external-db-values.yaml

      - name: Lint (mixed mode — CNPG bundled, cert-manager pre-installed)
        run: helm lint chart/clay/ --values chart/clay/ci/ci-mixed-values.yaml

      - name: Template (mixed mode — CNPG bundled, cert-manager pre-installed)
        run: helm template clay chart/clay/ --values chart/clay/ci/ci-mixed-values.yaml

      - name: Lint (TLS — letsencrypt mode)
        run: helm lint chart/clay/ --values chart/clay/ci/tls-letsencrypt-values.yaml

      - name: Template (TLS — letsencrypt mode)
        run: helm template clay chart/clay/ --values chart/clay/ci/tls-letsencrypt-values.yaml

      - name: Lint (TLS — selfsigned mode)
        run: helm lint chart/clay/ --values chart/clay/ci/tls-selfsigned-values.yaml

      - name: Template (TLS — selfsigned mode)
        run: helm template clay chart/clay/ --values chart/clay/ci/tls-selfsigned-values.yaml

      - name: Lint (TLS — custom mode)
        run: helm lint chart/clay/ --values chart/clay/ci/tls-custom-values.yaml

      - name: Template (TLS — custom mode)
        run: helm template clay chart/clay/ --values chart/clay/ci/tls-custom-values.yaml

      - name: Behavioral tests (INGR-01..04, TLS-01..03, CI-01..05)
        run: chart/tests/helm-template-test.sh
