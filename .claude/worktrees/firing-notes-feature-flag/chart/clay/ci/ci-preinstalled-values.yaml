# CI test values for pre-installed operators mode (both operators pre-installed, CRs still render)
secrets:
  ADMIN_PASS: "ci-test-only"
  SESSION_SECRET: "ci-test-session-secret-not-for-production"

postgres:
  managed: true
  cluster:
    instances: 1
    storage:
      size: 1Gi
      storageClass: ""
  external:
    dsn: ""

cloudnative-pg:
  enabled: false

cert-manager:
  enabled: false
