apiVersion: v2
name: clay
description: A Helm chart for the Clay pottery shop
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: cloudnative-pg
    repository: oci://ghcr.io/cloudnative-pg/charts
    version: "0.28.0"
    condition: cloudnative-pg.enabled
  - name: cert-manager
    repository: oci://quay.io/jetstack/charts
    version: "v1.20.2"
    condition: cert-manager.enabled
  - name: replicated
    repository: oci://registry.replicated.com/library
    version: 1.19.1
