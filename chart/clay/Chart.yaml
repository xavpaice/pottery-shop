apiVersion: v2
name: clay
description: A Helm chart for the Clay pottery shop
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: cloudnative-pg
    repository: https://cloudnative-pg.github.io/charts
    version: "0.28.0"
    condition: cloudnative-pg.enabled
  - name: cert-manager
    repository: https://charts.jetstack.io
    version: "v1.20.2"
    condition: cert-manager.enabled
