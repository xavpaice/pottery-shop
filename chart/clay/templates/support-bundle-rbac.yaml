apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clay.fullname" . }}
  labels:
    {{- include "clay.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "clay.fullname" . }}-support-bundle
  labels:
    {{- include "clay.labels" . | nindent 4 }}
rules:
  # support-bundle --load-cluster-specs needs to find Secrets with troubleshoot.sh/kind label
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Collectors: pods, logs, services, endpoints, configmaps, pvcs, events, nodes
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps", "persistentvolumeclaims", "events", "nodes", "namespaces"]
    verbs: ["get", "list"]
  # Storage classes
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  # Deployments, replicasets, jobs
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list"]
  # Ingress
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  # CNPG clusters
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list"]
  # cert-manager
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers", "certificates"]
    verbs: ["get", "list"]
  # Exec into pods (for collectors)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "clay.fullname" . }}-support-bundle
  labels:
    {{- include "clay.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "clay.fullname" . }}-support-bundle
subjects:
  - kind: ServiceAccount
    name: {{ include "clay.fullname" . }}
    namespace: {{ .Release.Namespace }}
