# Default values for clay pottery shop

replicaCount: 1

image:
  repository: ghcr.io/xavpaice/pottery-shop
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: traefik          # ingressClassName field -- override for non-Traefik controllers
  host: ""                    # REQUIRED when enabled -- e.g. shop.example.com
  tls:
    mode: ""                  # REQUIRED when enabled -- letsencrypt | selfsigned | custom
    secretName: ""            # custom mode only -- name of pre-existing TLS Secret
    acme:
      email: ""               # letsencrypt mode only -- REQUIRED
      production: false       # letsencrypt: false = staging ACME endpoint

config:
  PORT: "8080"
  BASE_URL: "https://clay.nz"
  ADMIN_USER: "admin"
  UPLOAD_DIR: "/data/uploads"
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_FROM: ""
  ORDER_EMAIL: ""               # REQUIRED — recipient address for order notification emails

secrets:
  ADMIN_PASS: ""          # REQUIRED — must be set at deploy time
  SESSION_SECRET: ""      # REQUIRED — must be set at deploy time
  SMTP_USER: ""
  SMTP_PASS: ""

persistence:
  # Persistent storage for uploaded product images (uploads directory)
  enabled: true
  accessMode: ReadWriteOnce
  size: 5Gi
  storageClass: ""
  existingClaim: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

containerPort: 8080

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 2
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 30

startupProbe:
  httpGet:
    path: /healthz
    port: 8080
  failureThreshold: 30
  periodSeconds: 2

nodeSelector: {}
tolerations: []
affinity: {}

# -- Feature flags
# Features listed here can be toggled per deployment. Defaults are "on" to preserve
# existing behaviour for upgrades. Set to false to disable.
features:
  firingLogs:
    enabled: true   # Seller kiln-session tracking (firing logs + temperature readings)

# -- Postgres configuration (managed via CNPG or external DSN)
postgres:
  managed: true
  cluster:
    instances: 1
    storage:
      size: 5Gi
      storageClass: ""
  external:
    # SECURITY: never embed credentials in dsn — use a pre-created Kubernetes Secret
    # and reference it via an ExternalSecret or sealed-secret instead.
    dsn: ""

# -- Image used by the wait-for-postgres init-container (managed mode only).
# Pin to a specific patch version to avoid mutable-tag supply-chain risk.
waitForPostgres:
  image: postgres:16.3-alpine3.20

# -- Subchart operator toggles
#
# cloudnative-pg.enabled: install the CNPG operator as a bundled subchart.
#   Independent of postgres.managed — postgres.managed controls whether a CNPG Cluster CR
#   is rendered; cloudnative-pg.enabled controls whether the CNPG operator itself is bundled.
#   Set to false when the CNPG operator is already installed in the cluster (pre-installed mode).
#   Installs into the same namespace as this release (no namespace override). (D-01, D-02)
#
cloudnative-pg:
  enabled: true   # -- default: true (full umbrella install bundles the operator)

# -- cert-manager.enabled: install cert-manager as a bundled subchart.
#   Set to false when cert-manager is already installed in the cluster (pre-installed mode).
#   Installs into the same namespace as this release (no namespace override). (D-01)
#
cert-manager:
  enabled: true   # -- default: true (full umbrella install bundles the operator)
  installCRDs: true  # -- install cert-manager CRDs (ClusterIssuer, Certificate, etc.)

