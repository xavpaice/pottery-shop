# Default values for clay pottery shop

replicaCount: 1


clay:
  image:
    # Full proxy path including source registry, e.g. proxy.clay.nz/proxy/<app>/ghcr.io
    # ReplicatedImageRegistry rewrites this for airgap installs.
    registry: proxy.clay.nz/proxy/xav-pottery-shop/ghcr.io
    repository: xavpaice/pottery-shop
    tag: ""  # defaults to Chart.AppVersion when empty
    pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: NodePort
  port: 80
  nodePort: 30900

ingress:
  enabled: false
  className: traefik          # ingressClassName field -- override for non-Traefik controllers
  host: ""                    # REQUIRED when enabled -- e.g. shop.example.com
  tls:
    mode: ""                  # REQUIRED when enabled -- letsencrypt | selfsigned | custom
    secretName: ""            # custom mode only -- name of pre-existing TLS Secret
    acme:
      email: ""               # letsencrypt mode only -- REQUIRED
      production: false       # letsencrypt: false = staging ACME endpoint

config:
  CUSTOM_LOGO_DATA: ""
  PORT: "8080"
  BASE_URL: "https://clay.nz"
  ADMIN_USER: "admin"
  UPLOAD_DIR: "/data/uploads"
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_FROM: ""
  ORDER_EMAIL: ""               # REQUIRED — recipient address for order notification emails

secrets:
  ADMIN_PASS: ""          # REQUIRED — must be set at deploy time
  SESSION_SECRET: ""      # REQUIRED — must be set at deploy time
  SMTP_USER: ""
  SMTP_PASS: ""

persistence:
  # Persistent storage for uploaded product images (uploads directory)
  enabled: true
  accessMode: ReadWriteOnce
  size: 5Gi
  storageClass: ""
  existingClaim: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

containerPort: 8080

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 2
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 30

startupProbe:
  httpGet:
    path: /healthz
    port: 8080
  failureThreshold: 30
  periodSeconds: 2

nodeSelector: {}
tolerations: []
affinity: {}

# -- Feature flags
# Features listed here can be toggled per deployment. Defaults are "on" to preserve
# existing behaviour for upgrades. Set to false to disable.
features:
  firingLogs:
    enabled: true   # Seller kiln-session tracking (firing logs + temperature readings)

# -- Postgres: two modes:
#   managed (default) — CloudNativePG operator + cluster run in-cluster.
#   external          — set managed: false and provide external.dsn.
postgres:
  managed: true
  cluster:
    imageName: proxy.clay.nz/proxy/xav-pottery-shop/ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
    instances: 1
    storage:
      size: 5Gi
      storageClass: ""
  external:
    # SECURITY: never embed credentials in dsn — use a pre-created Kubernetes Secret
    # and reference it via an ExternalSecret or sealed-secret instead.
    dsn: ""

# -- Image used by the wait-for-postgres init-container (managed mode only).
# Pin to a specific patch version to avoid mutable-tag supply-chain risk.
waitForPostgres:
  image:
    registry: proxy.clay.nz/proxy/xav-pottery-shop/index.docker.io
    repository: library/postgres
    tag: 16.3-alpine3.20

# -- Image used by webhook-wait Jobs to poll operator readiness.
webhookWait:
  image:
    registry: proxy.clay.nz/proxy/xav-pottery-shop/index.docker.io
    repository: alpine/k8s
    tag: "1.35.3"

cloudnative-pg:
  image:
    repository: proxy.clay.nz/proxy/xav-pottery-shop/ghcr.io/cloudnative-pg/cloudnative-pg
  imagePullSecrets:
    - name: enterprise-pull-secret

# -- cert-manager: install cert-manager as a bundled subchart.
#   Set enabled: false when cert-manager is already installed in the cluster.
cert-manager:
  enabled: true
  installCRDs: true  # -- install cert-manager CRDs (ClusterIssuer, Certificate, etc.)
  imageRegistry: proxy.clay.nz/proxy/xav-pottery-shop/quay.io
  global:
    imagePullSecrets:
      - name: enterprise-pull-secret

# -- Replicated SDK
replicated:
  nameOverride: clay-sdk
  image:
    registry: proxy.clay.nz
    repository: library/replicated-sdk-image

