# CI test values for external Postgres mode
secrets:
  ADMIN_PASS: "ci-test-only"
  SESSION_SECRET: "ci-test-session-secret-not-for-production"

postgres:
  managed: false
  cluster:
    instances: 1
    storage:
      size: 1Gi
      storageClass: ""
  external:
    dsn: "postgresql://clay-db.example.com:5432/clay"

